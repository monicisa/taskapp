<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container">
      <span class="navbar-brand">
        <span class="brand-icon">✦</span>
      </span>
      <span class="task-counter" id="taskCounter">0 tareas</span>
    </div>
  </nav>
  <div class="container main-container">
    <div class="page-header">
      <h1 class="page-title">Tus Tareas</h1>
      <p class="page-subtitle">Mantente enfocado. Hazlo.</p>
    </div>
    <div class="add-task-card">
      <div class="input-group">
        <input type="text" id="taskInput" class="form-control task-input" placeholder="¿Qué necesitas hacer?" maxlength="500" autocomplete="off" />
        <button class="btn btn-add" id="addBtn" onclick="addTask()">
          <span>Agregar</span>
          <span class="btn-icon">→</span>
        </button>
      </div>
      <div id="inputError" class="input-error d-none">Por favor escribe una tarea.</div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completadas</button>
    </div>
    <div id="taskList" class="task-list">
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Cargando tareas...</p>
      </div>
    </div>
    <div id="emptyState" class="empty-state d-none">
      <div class="empty-icon">◎</div>
      <h3>Nada por aquí</h3>
      <p>Agrega tu primera tarea arriba.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
